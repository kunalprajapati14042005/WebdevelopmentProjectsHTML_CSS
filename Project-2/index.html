<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Application Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="apply-box">

        <div class="header">
            <h1>Career Application Portal</h1>
            <p>Join our team and build the future with us.</p>
        </div>

        <form>

            <div class="form-grid">

                <div class="form-control">
                    <label>First Name</label>
                    <input type="text" placeholder="Enter First Name" required>
                </div>

                <div class="form-control">
                    <label>Last Name</label>
                    <input type="text" placeholder="Enter Last Name" required>
                </div>

                <div class="form-control">
                    <label>Email</label>
                    <input type="email" placeholder="Enter Email" required>
                </div>

                <div class="form-control">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="Enter Phone Number" required>
                </div>

                <div class="form-control">
                    <label>Job Role</label>
                    <select required>
                        <option value="">Select Role</option>
                        <option>Frontend Developer</option>
                        <option>Backend Developer</option>
                        <option>Full Stack Developer</option>
                        <option>Software Engineer</option>
                    </select>
                </div>

                <div class="form-control">
                    <label>Experience Level</label>
                    <select>
                        <option>Fresher</option>
                        <option>0-1 Years</option>
                        <option>1-3 Years</option>
                        <option>3+ Years</option>
                    </select>
                </div>

                <div class="form-control">
                    <label>City</label>
                    <input type="text" placeholder="Enter City">
                </div>

                <div class="form-control">
                    <label>Pincode</label>
                    <input type="number" placeholder="Enter Pincode">
                </div>

                <div class="form-control">
                    <label>Application Date</label>
                    <input type="date">
                </div>

                <div class="form-control">
                    <label>Upload Resume</label>
                    <input type="file">
                </div>

                <div class="form-control full-width">
                    <label>Skills</label>
                    <input type="text" placeholder="HTML, CSS, JavaScript, React">
                </div>

                <div class="form-control full-width">
                    <label>Address</label>
                    <textarea rows="4" placeholder="Enter Full Address"></textarea>
                </div>

                <div class="form-control full-width">
                    <label>Cover Letter</label>
                    <textarea rows="6" placeholder="Tell us why you're a good fit for this role"></textarea>
                </div>

            </div>

            <div class="button-container">
                <button type="reset" class="reset-btn">Reset</button>
                <button type="submit" class="submit-btn">Submit Application</button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
